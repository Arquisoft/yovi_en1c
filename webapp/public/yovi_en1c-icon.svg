<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 200 200">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <pattern id="honeycombPattern" x="0" y="0" width="28" height="48.5" patternUnits="userSpaceOnUse">
      <path d="M14 0 L28 8.1 L28 24.2 L14 32.3 L0 24.2 L0 8.1 Z" fill="none" stroke="#cccccc" stroke-width="0.7" />
      <path d="M0 24.2 L14 32.3 L14 48.5 L0 56.6 L-14 48.5 L-14 32.3 Z" fill="none" stroke="#cccccc" stroke-width="0.7" />
    </pattern>

    <clipPath id="hexClip">
      <path d="M0,-98 L85,-49 L85,49 L0,98 L-85,49 L-85,-49 Z" />
    </clipPath>
  </defs>

  <g transform="translate(100, 100)">
    
    <path d="M0,-98 L85,-49 L85,49 L0,98 L-85,49 L-85,-49 Z" fill="#fcfcfc" />

    <g clip-path="url(#hexClip)">
      <rect x="-100" y="-100" width="200" height="200" fill="url(#honeycombPattern)" />

      <g filter="url(#glow)">
        <path d="M14,-48.5 L28,-40.4 L28,-24.3 L14,-16.2 L0,-24.3 L0,-40.4 Z" fill="#0066ff" opacity="0.5" />
        <path d="M-14,0 L0,8.1 L0,24.2 L-14,32.3 L-28,24.2 L-28,8.1 Z" fill="#cc0000" opacity="0.5" />
        <path d="M14,48.5 L28,56.6 L28 72.7 L14 80.8 L0 72.7 L0 56.6 Z" fill="#0066ff" opacity="0.4" />
      </g>
    </g>

    <path d="M0,-98 L85,-49 L85,49 L0,98 L-85,49 L-85,-49 Z" fill="none" stroke="#111" stroke-width="5" />

    <text text-anchor="middle" font-family="Arial, sans-serif" font-size="50" font-weight="900" letter-spacing="1" fill="#111" y="18">YOVI</text>

    <g transform="translate(0, 50)">
      <line x1="-40" y1="0" x2="40" y2="0" stroke="#111" stroke-width="3" />
      <text text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" letter-spacing="2" fill="#111" y="24">EN1C</text>
    </g>
  </g>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Outer glow for the whole logo -->
    <filter id="outerGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle inner glow for hexagons -->
    <filter id="hexGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glow for the Y letter -->
    <filter id="letterGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Triangle clip path for the board shape -->
    <clipPath id="triangleClip">
      <polygon points="100,18 182,152 18,152"/>
    </clipPath>

    <!-- Gradient for the triangle border -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Gradient for the Y letter -->
    <linearGradient id="yGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <!-- Background radial gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1e2a3a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0c14" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Dark circular background -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ── Hexagonal mini-board inside the triangle ── -->
  <!-- Row 0: apex (1 hex) - cyan/Side B -->
  <polygon points="100,28 108.66,33 108.66,43 100,48 91.34,43 91.34,33"
           fill="rgba(34,211,238,0.15)" stroke="rgba(34,211,238,0.7)" stroke-width="1.2"
           filter="url(#hexGlow)"/>

  <!-- Row 1: 2 hexagons -->
  <!-- left - Side B edge -->
  <polygon points="87,52 95.66,57 95.66,67 87,72 78.34,67 78.34,57"
           fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.45)" stroke-width="1"/>
  <!-- right - Side C edge -->
  <polygon points="113,52 121.66,57 121.66,67 113,72 104.34,67 104.34,57"
           fill="rgba(196,181,253,0.08)" stroke="rgba(196,181,253,0.45)" stroke-width="1"/>

  <!-- Row 2: 3 hexagons -->
  <!-- left corner - touches B+C -->
  <polygon points="74,76 82.66,81 82.66,91 74,96 65.34,91 65.34,81"
           fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.4)" stroke-width="1.3"/>
  <!-- center - interior, blue player piece -->
  <polygon points="100,76 108.66,81 108.66,91 100,96 91.34,91 91.34,81"
           fill="rgba(56,189,248,0.55)" stroke="#7dd3fc" stroke-width="1.5"
           filter="url(#hexGlow)"/>
  <!-- right corner - touches B+C -->
  <polygon points="126,76 134.66,81 134.66,91 126,96 117.34,91 117.34,81"
           fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.4)" stroke-width="1.3"/>

  <!-- Row 3: 4 hexagons -->
  <!-- Side A edge cells (x=0) -->
  <polygon points="61,100 69.66,105 69.66,115 61,120 52.34,115 52.34,105"
           fill="rgba(251,146,60,0.08)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <!-- interior - red bot piece -->
  <polygon points="87,100 95.66,105 95.66,115 87,120 78.34,115 78.34,105"
           fill="rgba(251,113,133,0.55)" stroke="#fda4af" stroke-width="1.5"
           filter="url(#hexGlow)"/>
  <!-- interior -->
  <polygon points="113,100 121.66,105 121.66,115 113,120 104.34,115 104.34,105"
           fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Side A edge -->
  <polygon points="139,100 147.66,105 147.66,115 139,120 130.34,115 130.34,105"
           fill="rgba(251,146,60,0.08)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>

  <!-- ── Triangle border overlay ── -->
  <polygon points="100,18 182,152 18,152"
           fill="none"
           stroke="url(#borderGrad)"
           stroke-width="2.5"
           stroke-linejoin="round"
           filter="url(#outerGlow)"/>

  <!-- ── Side color dots on the three edges ── -->
  <!-- Side B (top-left edge) - cyan -->
  <circle cx="60" cy="70" r="3.5" fill="#22d3ee" opacity="0.8"/>
  <!-- Side C (top-right edge) - purple -->
  <circle cx="140" cy="70" r="3.5" fill="#c4b5fd" opacity="0.8"/>
  <!-- Side A (bottom edge) - orange -->
  <circle cx="100" cy="152" r="3.5" fill="#fb923c" opacity="0.8"/>

  <!-- ── Large Y letter ── -->
  <text
    x="100"
    y="175"
    text-anchor="middle"
    font-family="'Syne', 'Space Grotesk', sans-serif"
    font-size="36"
    font-weight="900"
    letter-spacing="-1"
    fill="url(#yGrad)"
    filter="url(#letterGlow)"
  >Y</text>

  <!-- Subtle ring around the circle -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="rgba(56,189,248,0.08)" stroke-width="2"/>
</svg>

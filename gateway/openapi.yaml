openapi: 3.0.0
info:
  title: Game Y Architecture API
  version: 1.0.0
  description: |
    Unified API for the Y Game system. 
    Entry point: Gateway Service (Port 8000).
    - User/History logic handled by Users Service (Node.js).
    - Bot/Game logic handled by Gamey Service (Rust).

    **Authentication:** Most endpoints require a JWT Bearer token. 
    The `/signup`, `/login`, `/play`, and `/choose` endpoints are strictly public (no token needed).

servers:
  - url: http://localhost:8000
    description: Gateway Server

# Define the global security requirement
security:
  - bearerAuth: []

tags:
  - name: Infrastructure
    description: Health monitoring for all services.
  - name: Users
    description: User registration and authentication.
  - name: Game History
    description: Persistence of match results.
  - name: Game Logic & Bots
    description: AI move selection and game turn processing.

paths:
  # --- INFRASTRUCTURE ---
  /health:
    get:
      security: [] # No token needed
      tags: [Infrastructure]
      summary: Gateway Health Check
      responses:
        "200":
          description: Gateway is operational.
          content:
            application/json:
              schema:
                type: object
                properties:
                  gateway: { type: string, example: "OK" }
                  users: { type: string, example: "OK" }
                  gamey: { type: string, example: "OK" }

  # --- USER SERVICE (via /api/users) ---
  /api/users/signup:
    post:
      security: [] # No token needed
      tags: [Users]
      summary: User Registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, email]
              properties:
                username: { type: string, example: "player1" }
                password: { type: string, example: "securePass123" }
                email: { type: string, example: "player1@example.com" }
      responses:
        "201":
          description: User registered and token generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Registration error (e.g., Username exists).

  /api/users/login:
    post:
      security: [] # No token needed
      tags: [Users]
      summary: User Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, example: "player1" }
                password: { type: string, example: "securePass123" }
      responses:
        "200":
          description: Login successful, returns JWT token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials.

  /api/users/games/list:
    get:
      tags: [Game History]
      summary: List User Games
      description: Returns the last 20 games for the specified user. **Requires a valid JWT token.**
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_]{1,32}$"
      responses:
        "200":
          description: List of the last 20 games.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameRecord"
        "401":
          description: Missing or invalid token.

  # --- GAMEY SERVICE (via /api/gamey) ---
  /api/gamey/{api_version}/ybot/choose/{bot_id}:
    post:
      security: [] # No token needed
      tags: [Game Logic & Bots]
      summary: Get Bot Move
      description: Submits the current YEN board state and gets the specific bot's calculated move. No token required.
      parameters:
        - name: api_version
          in: path
          required: true
          schema: { type: string, example: "v1" }
        - name: bot_id
          in: path
          required: true
          schema:
            {
              type: string,
              enum: [random_bot, easy_bot, heuristic_bot, rob_bot],
            }
      requestBody:
        description: Current game state in YEN format.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/YEN"
      responses:
        "200":
          description: Bot move coordinates.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveResponse"
        "400":
          description: Error (Invalid version or bot).

  /api/gamey/{api_version}/play:
    get:
      security: [] # No token needed
      tags: [Game Logic & Bots]
      summary: Process Turn
      description: Takes a stringified YEN state via query and an optional bot ID, returning the bot's calculated action or move. No token required.
      parameters:
        - name: api_version
          in: path
          required: true
          schema: { type: string, example: "v1" }
        - name: position
          in: query
          required: true
          description: The game state in stringified YEN JSON format.
          schema: { type: string }
        - name: bot_id
          in: query
          required: false
          description: The bot ID to play against. Defaults to heuristic_bot if not provided.
          schema: { type: string, example: "easy_bot" }
      responses:
        "200":
          description: The bot's decision (either movement coordinates or an action like "resign").
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotResponse"
        "400":
          description: Invalid YEN format or game already over.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthResponse:
      type: object
      properties:
        message: { type: string }
        token: { type: string }
        user:
          type: object
          properties:
            id: { type: string }
            username: { type: string }

    GameRecord:
      type: object
      required: [username, result, board, difficulty, boardSize, mode]
      properties:
        username: { type: string }
        result: { type: string, enum: [player_won, bot_won] }
        board: { type: object }
        totalMoves: { type: integer }
        difficulty: { type: string }
        boardSize: { type: string }
        mode: { type: string, enum: [standard, rob] }
        playedAt: { type: string, format: date-time }
        points: { type: integer }

    YEN:
      type: object
      description: The internal JSON state representation of the Y Game board.

    Coordinates:
      type: object
      properties:
        x: { type: integer }
        y: { type: integer }
        z: { type: integer }

    MoveResponse:
      type: object
      properties:
        api_version: { type: string }
        bot_id: { type: string }
        coords: { $ref: "#/components/schemas/Coordinates" }
        is_steal:
          {
            type: boolean,
            description: "Indicates if the placement is a steal (Rob mode)",
          }

    BotResponse:
      type: object
      description: Untagged Enum returning either coordinates or a string action.
      oneOf:
        - type: object
          properties:
            coords: { $ref: "#/components/schemas/Coordinates" }
        - type: object
          properties:
            action: { type: string, example: "resign" }

    ErrorResponse:
      type: object
      properties:
        api_version: { type: string, nullable: true }
        bot_id: { type: string, nullable: true }
        message: { type: string }

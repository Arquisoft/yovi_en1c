name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - run: npm --prefix users ci
    - run: npm --prefix webapp ci
    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@v1
      with:
        mongodb-version: '6.0'
    - name: Wait for MongoDB
      run: |
        for i in {1..10}; do
          nc -z localhost 27017 && echo "MongoDB is up" && exit 0
          echo "Waiting for MongoDB..."
          sleep 2
        done
        echo "MongoDB did not become available in time" && exit 1
      shell: bash
    - run: npm --prefix users run test:coverage
      env:
        MONGO_URI: mongodb://localhost:27017/yovi
    - run: npm --prefix webapp run test:coverage
    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov --locked
    - name: Generate gamey code coverage
      run: cd gamey && cargo llvm-cov --lcov --output-path lcov.info
    - name: Normalize Rust coverage paths
      run: |
        sed -i "s|SF:${GITHUB_WORKSPACE}/|SF:|g" gamey/lcov.info
        grep '^SF:' gamey/lcov.info | head
    - name: Analyze with SonarQube
      uses: SonarSource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}